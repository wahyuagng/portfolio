events{}
http {
    include /etc/nginx/mime.types;
    server {
        listen 80;

        root /usr/share/nginx/html;
        index index.html;
        location / {
            try_files $uri $uri.html /$uri /index.html;
        }
    }

    server {
        listen 443;

        ssl on;
        ssl_certificate         /etc/nginx/ssl/live-version.pem;
        ssl_certificate_key     /etc/nginx/ssl/live-version.key;

        root /usr/share/nginx/html;
        index index.html;
        location / {
			try_files $uri $uri.html /$uri /index.html;
        }
    }
}
